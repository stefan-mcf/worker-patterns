cases:
  - name: sequential_base
    request:
      objective: Fix one typo in README
      review_required: false
    expected_pattern: sequential
    expected_overlays: []
    expected_mechanism: direct
  - name: module_swarm_base
    request:
      objective: Refactor auth and billing modules in parallel
      scopes: [auth, billing]
      tests_required: true
    expected_pattern: module-swarm
    expected_overlays: [twin-inspection]
    expected_mechanism: delegate_task
  - name: phased_assembly_base
    request:
      objective: Migrate the app in ordered waves
      dependencies: [schema, api, ui]
      durable: true
    expected_pattern: phased-assembly
    expected_overlays: [twin-inspection]
    expected_mechanism: kanban
  - name: blueprint_fanout_base
    request:
      objective: Compare alternative dashboard designs
      variants_requested: 3
    expected_pattern: blueprint-fanout
    expected_overlays: [twin-inspection]
    expected_mechanism: delegate_task
  - name: recovery_lane_base
    request:
      objective: Recover blocked stale worker output after failed repair
      recovery: true
      risk_level: normal
    expected_pattern: recovery-lane
    expected_overlays: [twin-inspection]
    expected_mechanism: direct
  - name: bridge_lane_base
    request:
      objective: Recover failed canonical landing
      recovery: true
      risk_level: critical
    expected_pattern: bridge_lane
    expected_overlays: [twin-inspection]
    expected_mechanism: direct
  - name: twin_inspection_overlay
    request:
      objective: Fix one typo in README
      review_required: true
    expected_pattern: sequential
    expected_overlays: [twin-inspection]
    expected_mechanism: direct
